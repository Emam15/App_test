<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Courses - UAPMP</title>
    <link rel="stylesheet" href="../css/courses.css" />
    <link rel="stylesheet" href="../css/student-profile.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/courses.css" />
  </head>
  <body>
    <div class="container">
      <aside class="sidebar">
        <div class="sidebar-top">
          <div class="logo">
            <div class="logo-icon">
              <svg
                class="w-full h-full"
                fill="none"
                viewBox="0 0 48 48"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  clip-rule="evenodd"
                  d="M39.475 21.6262C40.358 21.4363 40.6863 21.5589 40.7581 21.5934C40.7876 21.655 40.8547 21.857 40.8082 22.3336C40.7408 23.0255 40.4502 24.0046 39.8572 25.2301C38.6799 27.6631 36.5085 30.6631 33.5858 33.5858C30.6631 36.5085 27.6632 38.6799 25.2301 39.8572C24.0046 40.4502 23.0255 40.7407 22.3336 40.8082C21.8571 40.8547 21.6551 40.7875 21.5934 40.7581C21.5589 40.6863 21.4363 40.358 21.6262 39.475C21.8562 38.4054 22.4689 36.9657 23.5038 35.2817C24.7575 33.2417 26.5497 30.9744 28.7621 28.762C30.9744 26.5497 33.2417 24.7574 35.2817 23.5037C36.9657 22.4689 38.4054 21.8562 39.475 21.6262ZM4.41189 29.2403L18.7597 43.5881C19.8813 44.7097 21.4027 44.9179 22.7217 44.7893C24.0585 44.659 25.5148 44.1631 26.9723 43.4579C29.9052 42.0387 33.2618 39.5667 36.4142 36.4142C39.5667 33.2618 42.0387 29.9052 43.4579 26.9723C44.1631 25.5148 44.659 24.0585 44.7893 22.7217C44.9179 21.4027 44.7097 19.8813 43.5881 18.7597L29.2403 4.41187C27.8527 3.02428 25.8765 3.02573 24.2861 3.36776C22.6081 3.72863 20.7334 4.58419 18.8396 5.74801C16.4978 7.18716 13.9881 9.18353 11.5858 11.5858C9.18354 13.988 7.18717 16.4978 5.74802 18.8396C4.58421 20.7334 3.72865 22.6081 3.36778 24.2861C3.02574 25.8765 3.02429 27.8527 4.41189 29.2403Z"
                  fill="currentColor"
                  fill-rule="evenodd"
                ></path>
              </svg>
            </div>
            <div class="logo-text">
              <h1>UAPMP</h1>
              <span>Student Portal</span>
            </div>
          </div>
          <nav class="menu">
            <a href="#" id="dashboardLink" class="menu-item"
              ><i class="fas fa-th-large"></i> Dashboard</a
            >
            <a href="#" class="menu-item active"
              ><i class="fas fa-book"></i> My Courses</a
            >
            <a href="#" class="menu-item"><i class="fas fa-tasks"></i> Tasks</a>
            <a href="#" class="menu-item"><i class="fas fa-star"></i> Grades</a>
            <a href="#" class="menu-item"
              ><i class="fas fa-calendar-alt"></i> Schedule</a
            >
            <a href="#" class="menu-item"
              ><i class="fas fa-cog"></i> Settings</a
            >
          </nav>
        </div>
        <div class="sidebar-footer">
          <div class="user-info">
            <img
              id="sidebarAvatar"
              src="https://ui-avatars.com/api/?name=User&background=random"
              alt="User"
            />
            <div>
              <p class="user-name" id="sidebarUserName">User Name</p>
              <p class="user-id" id="sidebarUserId">ID:</p>
            </div>
          </div>
          <i class="fas fa-sign-out-alt logout-btn"></i>
        </div>
      </aside>

      <main class="main-content">
        <header class="header">
          <h2>My Courses</h2>
          <div class="header-right">
            <div class="search-bar">
              <i class="fas fa-search"></i>
              <input
                type="text"
                placeholder="Search for courses, assignments..."
              />
            </div>
            <div class="header-icons">
              <i class="far fa-moon" id="themeToggle"></i>
              <img
                src="https://ui-avatars.com/api/?name=Alex+Chen&background=E5B79B"
                class="top-avatar"
              />
            </div>
          </div>
        </header>

        <div class="courses-grid">
          <script src="../config.js"></script>
          <script>
            // Fetch and render user's enrolled classes from DB
            async function loadStudentClasses() {
              const token = localStorage.getItem("token");
              if (!token) return;
              try {
                const res = await fetch(
                  API_CONFIG.BASE_URL + "/api/classes/my",
                  {
                    headers: {
                      Authorization: `Bearer ${token}`,
                      "Content-Type": "application/json",
                    },
                  },
                );
                const data = await res.json();
                const grid = document.querySelector(".courses-grid");
                grid.innerHTML = "";
                if (!res.ok || !data.classes || data.classes.length === 0) {
                  grid.innerHTML =
                    '<div style="color:#888;padding:24px;">No enrolled classes found.</div>';
                  return;
                }
                // Color classes for variety
                const bgClasses = [
                  "blue-bg",
                  "green-bg",
                  "orange-bg",
                  "sky-bg",
                  "pink-bg",
                  "teal-bg",
                  "gold-bg",
                  "magenta-bg",
                ];
                data.classes.forEach((cls, idx) => {
                  const card = document.createElement("div");
                  card.className = "course-card";
                  const bgClass = bgClasses[idx % bgClasses.length];
                  card.innerHTML = `
                              <div class="card-header ${bgClass}"><span>${cls.courseCode || "CLASS"}</span></div>
                              <div class="card-body">
                                <h5>${cls.name}</h5>
                                <p class="prof">${cls.instructor && cls.instructor.fullName ? cls.instructor.fullName : ""}</p>
                                <div class="info-row">
                                  <span><i class="fa-solid fa-calendar-days" title="Semester"></i> ${cls.semester || ""} ${cls.year || ""}</span>
                                  <span><i class="fa-solid fa-hashtag" title="Enrolled Students"></i> ${cls.students ? cls.students.length : 0} students</span>
                                  <span><i class="fa-solid fa-key" title="Join Code"></i> ${cls.joinCode || "-"}</span>
                                </div>
                                <button class="btn-details">View Details</button>
                              </div>
                            `;
                  grid.appendChild(card);
                });
              } catch (e) {
                document.querySelector(".courses-grid").innerHTML =
                  `<div style='color:red;padding:24px;'>Error loading classes: ${e.message}</div>`;
              }
            }
            window.addEventListener("DOMContentLoaded", loadStudentClasses);
          </script>
          <!-- User's enrolled classes will be loaded from the database -->
        </div>
      </main>
    </div>

    <script>
      // Fetch and display user info in sidebar footer
      async function loadSidebarUserInfo() {
        const token = localStorage.getItem("token");
        if (!token) return;
        try {
          const res = await fetch(API_CONFIG.BASE_URL + "/api/auth/me", {
            headers: {
              Authorization: `Bearer ${token}`,
              "Content-Type": "application/json",
            },
          });
          if (!res.ok) return;
          const data = await res.json();
          if (data && data.user) {
            document.getElementById("sidebarUserName").textContent =
              data.user.fullName || "User Name";
            document.getElementById("sidebarUserId").textContent = data.user
              .studentId
              ? `ID: ${data.user.studentId}`
              : data.user.instructorId
                ? `ID: ${data.user.instructorId}`
                : "";
            document.getElementById("sidebarAvatar").src =
              `https://ui-avatars.com/api/?name=${encodeURIComponent(data.user.fullName || "User")}&background=random`;
          }
        } catch (e) {
          // Fallback: do nothing
        }
      }
      window.addEventListener("DOMContentLoaded", loadSidebarUserInfo);

      // كود تشغيل الدارك مود واللايت مود كما في ملفك الأصلي
      const toggleBtn = document.getElementById("themeToggle");
      if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark-mode");
        toggleBtn.classList.replace("fa-moon", "fa-sun");
      }
      toggleBtn.addEventListener("click", () => {
        document.body.classList.toggle("dark-mode");
        const isDark = document.body.classList.contains("dark-mode");
        localStorage.setItem("theme", isDark ? "dark" : "light");
        isDark
          ? toggleBtn.classList.replace("fa-moon", "fa-sun")
          : toggleBtn.classList.replace("fa-sun", "fa-moon");
      });

      // Dashboard link role-based redirect
      document
        .getElementById("dashboardLink")
        .addEventListener("click", function (e) {
          e.preventDefault();
          // Assume role is stored in localStorage as 'role' ('student' or 'instructor')
          const role = localStorage.getItem("role");
          if (role === "instructor") {
            window.location.href = "instructor-profile.html";
          } else {
            window.location.href = "student-profile.html";
          }
        });
    </script>
  </body>
</html>
