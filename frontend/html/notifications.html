<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notifications - UAPMP</title>
    <link rel="stylesheet" href="../css/student-profile.css" />
    <link rel="stylesheet" href="../css/notifications.css" />
    <link

      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <aside class="sidebar">
        <div class="sidebar-top">
          <div class="logo">

            </div>
            <div class="logo-text">
              <h1>UAPMP</h1>
              <span>Student Portal</span>
              <script>
                document.getElementById("announcementsBell").onclick =
                  function () {
                    window.location.href = "notifications.html";
                  };
              </script>
            </div>
          </div>
          <nav class="menu">
            <a href="#" id="dashboardLink" class="menu-item"
              ><i class="fas fa-th-large"></i> Dashboard</a
            >
            <a href="courses.html" class="menu-item"
              ><i class="fas fa-book"></i> My Courses</a
            >
            <a href="#" class="menu-item"><i class="fas fa-tasks"></i> Tasks</a>
            <a href="#" class="menu-item"><i class="fas fa-star"></i> Grades</a>
            <a href="#" class="menu-item"
              ><i class="fas fa-calendar-alt"></i> Schedule</a
            >
            <a href="#" class="menu-item"
              ><i class="fas fa-cog"></i> Settings</a
            >
          </nav>
        </div>
        <div class="sidebar-footer">
          <div class="user-info">
            <img
              id="notifAvatar"
              src="https://ui-avatars.com/api/?name=Loading&background=random"
              alt="User"
            />
            <div>
              <p class="user-name" id="notifName">Loading...</p>
              <!-- Removed user ID from sidebar -->
            </div>
          </div>
          <i class="fas fa-sign-out-alt logout-btn"></i>
        </div>
      </aside>

      <main class="main-content">
        <header class="header">
          <h2>Notifications</h2>
          <div class="header-right">
            <div class="search-bar">
              <i class="fas fa-search"></i>
              <input type="text" placeholder="Search notifications..." />
            </div>
            <div class="header-icons">
              <a href="#" class="notification-link">
                <i class="fa-solid fa-bell"></i>
              </a>
              <i class="far fa-moon" id="themeToggle"></i>
              <img
                id="notifTopAvatar"
                src="https://ui-avatars.com/api/?name=Placeholder&background=E5B79B"
                class="top-avatar"
              />
            </div>
            <script src="../config.js"></script>
            <script>
              // Populate user info from localStorage
              (function populateUser() {
                const userJson = localStorage.getItem("user");
                if (!userJson) return;
                try {
                  const user = JSON.parse(userJson);
                  const name = user.fullName || "";
                  // update sidebar
                  document.getElementById("notifName").textContent = name;
                  // avatars
                  const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random`;
                  document.getElementById("notifAvatar").src = avatarUrl;
                  document.getElementById("notifTopAvatar").src =
                    avatarUrl.replace("background=random", "background=E5B79B");
                } catch (e) {
                  console.error(
                    "Failed to parse user data for notifications:",
                    e,
                  );
                }
              })();
            </script>
          </div>
        </header>

        <section class="notif-center">
          <div class="notif-header">
            <h3 id="notifTitle">Notifications Center</h3>
            <p id="notifDesc">
              Stay updated with announcements from your professors and
              administration
            </p>
          </div>

          <div class="notif-list" id="notifList">
            <!-- Announcements will be rendered here -->
          </div>
        </section>
      </main>
    </div>

    <script src="../config.js"></script>
    <script>
      // Dashboard link role-based redirect
      document
        .getElementById("dashboardLink")
        .addEventListener("click", function (e) {
          e.preventDefault();
          const role = localStorage.getItem("role");
          if (role === "instructor") {
            window.location.href = "instructor-profile.html";
          } else {
            window.location.href = "student-profile.html";
          }
        });

      // Show announcements title/desc based on role automatically
      (function setNotifHeader() {
        let role = "student";
        try {
          const user = JSON.parse(localStorage.getItem("user") || "{}");
          role = user.role || "student";
        } catch (_) {}

        if (role === "instructor") {
          document.getElementById("notifTitle").textContent =
            "Instructor Announcements";
          document.getElementById("notifDesc").textContent =
            "View important announcements for instructors.";
        } else {
          document.getElementById("notifTitle").textContent =
            "Student Announcements";
          document.getElementById("notifDesc").textContent =
            "View important announcements for students.";
        }
      })();
      // Dark Mode Toggle
      const toggleBtn = document.getElementById("themeToggle");
      if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark-mode");
        toggleBtn.classList.replace("fa-moon", "fa-sun");
      }
      toggleBtn.addEventListener("click", () => {
        document.body.classList.toggle("dark-mode");
        const isDark = document.body.classList.contains("dark-mode");
        localStorage.setItem("theme", isDark ? "dark" : "light");
        isDark
          ? toggleBtn.classList.replace("fa-moon", "fa-sun")
          : toggleBtn.classList.replace("fa-sun", "fa-moon");
      });

      // Fetch and render announcements from DB
      const API_URL =
        window.API_CONFIG && window.API_CONFIG.BASE_URL
          ? window.API_CONFIG.BASE_URL
          : "http://localhost:5000";
      const ANNOUNCEMENTS_URL = API_URL + "/api/announcements";
      const token = localStorage.getItem("token");

      async function fetchAnnouncements() {
        const res = await fetch(ANNOUNCEMENTS_URL, {
          headers: { Authorization: `Bearer ${token}` },
        });
        const data = await res.json();
        renderAnnouncements(data.announcements || []);
      }

      function renderAnnouncements(list) {
        const container = document.getElementById("notifList");
        if (!list.length) {
          container.innerHTML =
            '<div class="text-gray-500">No announcements yet.</div>';
          return;
        }
        container.innerHTML = list
          .map(
            (a) => `
                    <div class="notif-card ${a.visibleTo.includes("admin") ? "admin" : a.visibleTo.includes("instructor") ? "doctor" : ""}">
                        <div class="notif-icon"><i class="fas fa-bullhorn"></i></div>
                        <div class="notif-body">
                            <div class="notif-meta">
                                <span class="notif-type">${a.visibleTo.join(", ")}</span>
                                <span class="notif-time">${new Date(a.createdAt).toLocaleString()}</span>
                            </div>
                            <h4>${a.title}</h4>
                            <p>${a.message}</p>
                              ${a.link ? `<div class="notif-link"><a href="${a.link}" target="_blank" class="attachment-link"><i class="fa-solid fa-link"></i> ${a.visibleTo.includes("admin") ? "View Admin Attachment" : a.visibleTo.includes("instructor") ? "View Doctor Attachment" : "View Resource"}</a></div>` : ""}
                        </div>
                    </div>
                `,
          )
          .join("");
      }

      fetchAnnouncements();
      // logout button functionality (copied from student-profile.html)
      document
        .querySelector(".logout-btn")
        .addEventListener("click", function () {
          localStorage.removeItem("token");
          localStorage.removeItem("user");
          window.location.href = "signin.html";
        });
    </script>
  </body>
</html>
